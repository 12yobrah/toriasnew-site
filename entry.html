<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account | TORIAS GLAM HAVEN</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-container {
      max-width: 450px;
      margin: 120px auto;
      padding: 40px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(201, 168, 76, 0.2);
      border-radius: 12px;
      backdrop-filter: blur(10px);
      text-align: center;
    }
    .auth-tabs {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-bottom: 30px;
    }
    .auth-tab {
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      font-family: var(--font-serif);
      font-size: 1.2rem;
      cursor: pointer;
      padding-bottom: 5px;
      border-bottom: 2px solid transparent;
      transition: 0.3s;
    }
    .auth-tab.active {
      color: var(--clr-gold);
      border-bottom-color: var(--clr-gold);
    }
    .auth-form {
      display: none;
      flex-direction: column;
      gap: 15px;
    }
    .auth-form.active {
      display: flex;
    }
    .auth-group {
      text-align: left;
    }
    .auth-group label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
      color: rgba(255,255,255,0.6);
    }
    .auth-input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 12px 15px;
      border-radius: 6px;
      color: #fff;
      font-size: 0.9rem;
      transition: 0.3s;
    }
    .auth-input:focus {
      outline: none;
      border-color: var(--clr-gold);
      background: rgba(255,255,255,0.08);
    }
    .google-btn {
      margin-top: 25px;
      width: 100%;
      background: #fff;
      color: #000;
      border: none;
      padding: 12px;
      border-radius: 6px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: 0.3s;
    }
    .google-btn:hover {
      background: #f0f0f0;
    }
    .error-msg {
      color: #ff4d4d;
      font-size: 0.8rem;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body class="dark-luxe">
  <div class="auth-container animate-up">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login">Sign In</button>
      <button class="auth-tab" id="tab-signup">Register</button>
    </div>

    <!-- Login Form -->
    <form id="login-form" class="auth-form active">
      <div class="auth-group">
        <label>Email Address</label>
        <input type="email" class="auth-input" id="login-email" required>
      </div>
      <div class="auth-group">
        <label>Password</label>
        <input type="password" class="auth-input" id="login-password" required>
      </div>
      <button type="submit" class="btn btn-gold full-width">Sign In</button>
      <p id="login-error" class="error-msg"></p>
    </form>

    <!-- Signup Form -->
    <form id="signup-form" class="auth-form">
      <div class="auth-group">
        <label>Full Name</label>
        <input type="text" class="auth-input" id="signup-name" required>
      </div>
      <div class="auth-group">
        <label>Email Address</label>
        <input type="email" class="auth-input" id="signup-email" required>
      </div>
      <div class="auth-group">
        <label>Password</label>
        <input type="password" class="auth-input" id="signup-password" required minlength="6">
      </div>
      <button type="submit" class="btn btn-gold full-width">Join Torias</button>
      <p id="signup-error" class="error-msg"></p>
    </form>

    <div style="margin: 20px 0; color: rgba(255,255,255,0.3); font-size: 0.7rem;">OR CONTINUE WITH</div>

    <button class="google-btn" id="google-login">
      <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign in with Google
    </button>
    
    <div style="margin-top: 30px;">
      <a href="index.html" style="color: rgba(255,255,255,0.4); text-decoration: none; font-size: 0.8rem;">← Back to Home</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/auth.js"></script>
</body>
</html>
